<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Duty" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" media="print" onload="this.media='all'" />
    <title>Duty</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker with auto-update
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          // Check for updates every 60 seconds
          setInterval(function() { reg.update() }, 60000)

          reg.addEventListener('updatefound', function() {
            var newSW = reg.installing
            if (!newSW) return
            newSW.addEventListener('statechange', function() {
              // New SW is ready — tell it to activate and reload
              if (newSW.state === 'activated') {
                window.location.reload()
              } else if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                newSW.postMessage('skipWaiting')
              }
            })
          })
        }).catch(function() {})

        // Reload when a new SW takes over
        var refreshing = false
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (!refreshing) { refreshing = true; window.location.reload() }
        })
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
