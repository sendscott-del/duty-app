<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Duty" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Duty</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Catch uncaught errors and show them on screen for debugging
      window.addEventListener('error', function(e) {
        var d = document.createElement('pre');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:16px;font-size:12px;white-space:pre-wrap;max-height:50vh;overflow:auto';
        d.textContent = 'ERROR: ' + e.message + '\n' + (e.filename || '') + ':' + e.lineno + '\n' + (e.error?.stack || '');
        document.body.prepend(d);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.createElement('pre');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:16px;font-size:12px;white-space:pre-wrap;max-height:50vh;overflow:auto';
        d.textContent = 'UNHANDLED PROMISE: ' + (e.reason?.message || e.reason) + '\n' + (e.reason?.stack || '');
        document.body.prepend(d);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
